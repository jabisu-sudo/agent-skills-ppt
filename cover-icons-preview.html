<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Cover Icon Options</title>
<style>
body { background: #EEF2F7; display: flex; gap: 60px; justify-content: center; align-items: center; min-height: 100vh; flex-wrap: wrap; font-family: -apple-system, sans-serif; }
.option { text-align: center; }
.option h3 { margin-top: 16px; color: #64748B; font-size: 16px; }
svg { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08)); }
</style></head><body>

<div class="option">
<svg width="200" height="160" viewBox="0 0 200 160">
  <!-- Option A: Folder with doc + gear -->
  <rect x="20" y="40" width="160" height="100" rx="12" fill="white" stroke="#3B82F6" stroke-width="2.5"/>
  <path d="M20 52 L20 46 Q20 40 26 40 L70 40 L82 28 L160 28 Q166 28 166 34 L166 40" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
  <!-- Doc icon -->
  <rect x="50" y="65" width="40" height="50" rx="4" fill="none" stroke="#64748B" stroke-width="2"/>
  <line x1="58" y1="78" x2="82" y2="78" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="58" y1="86" x2="78" y2="86" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="58" y1="94" x2="82" y2="94" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="58" y1="102" x2="74" y2="102" stroke="#94A3B8" stroke-width="1.5"/>
  <!-- Gear icon -->
  <circle cx="130" cy="90" r="16" fill="none" stroke="#10B981" stroke-width="2.5"/>
  <circle cx="130" cy="90" r="6" fill="none" stroke="#10B981" stroke-width="2"/>
  <line x1="130" y1="70" x2="130" y2="76" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="130" y1="104" x2="130" y2="110" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="110" y1="90" x2="116" y2="90" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="144" y1="90" x2="150" y2="90" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
</svg>
<h3>A: Folder + Doc + Gear</h3>
</div>

<div class="option">
<svg width="200" height="160" viewBox="0 0 200 160">
  <!-- Option B: Stacked cards / layers -->
  <rect x="40" y="20" width="120" height="80" rx="10" fill="white" stroke="#94A3B8" stroke-width="1.5" opacity="0.5" transform="translate(8, 8)"/>
  <rect x="40" y="20" width="120" height="80" rx="10" fill="white" stroke="#94A3B8" stroke-width="1.5" opacity="0.7" transform="translate(4, 4)"/>
  <rect x="40" y="20" width="120" height="80" rx="10" fill="white" stroke="#3B82F6" stroke-width="2.5"/>
  <!-- Lines on top card -->
  <line x1="56" y1="40" x2="100" y2="40" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="52" x2="144" y2="52" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="62" x2="130" y2="62" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="72" x2="140" y2="72" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="82" x2="110" y2="82" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow indicating "load" -->
  <path d="M100 115 L100 130 M92 124 L100 132 L108 124" stroke="#10B981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="150" text-anchor="middle" font-size="13" fill="#64748B" font-family="-apple-system, sans-serif">on demand</text>
</svg>
<h3>B: Stacked Cards (Load on Demand)</h3>
</div>

<div class="option">
<svg width="200" height="160" viewBox="0 0 200 160">
  <!-- Option C: Puzzle pieces -->
  <rect x="30" y="30" width="60" height="50" rx="8" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="2"/>
  <text x="60" y="60" text-anchor="middle" font-size="20">📄</text>
  
  <rect x="110" y="30" width="60" height="50" rx="8" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="2"/>
  <text x="140" y="60" text-anchor="middle" font-size="20">⚡</text>
  
  <rect x="30" y="95" width="60" height="50" rx="8" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="2"/>
  <text x="60" y="125" text-anchor="middle" font-size="20">📚</text>
  
  <rect x="110" y="95" width="60" height="50" rx="8" fill="#8B5CF6" opacity="0.15" stroke="#8B5CF6" stroke-width="2"/>
  <text x="140" y="125" text-anchor="middle" font-size="20">🔧</text>
  
  <!-- Connection lines -->
  <line x1="90" y1="55" x2="110" y2="55" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="90" y1="120" x2="110" y2="120" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="60" y1="80" x2="60" y2="95" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="140" y1="80" x2="140" y2="95" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
<h3>C: Module Grid</h3>
</div>

</body></html>
